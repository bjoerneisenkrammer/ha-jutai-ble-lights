name: "JuTai BLE MQTT Bridge"
version: "0.1.0"
slug: "jutai_ble_bridge"
description: "Bridge between Lumineo/JuTai BLE Christmas lights and MQTT"
startup: services
boot: auto
arch:
  - aarch64
  - amd64
  - armv7
init: false
host_network: true
privileged:
  - NET_ADMIN
  - SYS_ADMIN
map:
  - config:rw
  - share:rw
  - type: device
    device: /dev/bus/usb
  - type: tmpfs
    path: /run  
devices:
  - /var/run/dbus
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "jutai_ble_bridge"
  mqtt_pass: "lichterkette"
  devices:
  - name: "lichterkette_1"
    mac: "AA:BB:CC:DD:EE:FF"
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: str
  devices:
    - name: str
      mac: str
